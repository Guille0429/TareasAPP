name: tareas_app
description: Aplicación de tareas Flutter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  firebase_storage: ^12.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^3.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/Icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/Icon.png